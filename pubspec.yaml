name: fitness
description: "Interactive Fitness Coaching App - MVP with Pose Estimation"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Pose Detection
  google_mlkit_pose_detection: ^0.11.0
  camera: ^0.11.0

  # Backend
  supabase_flutter: ^2.5.6

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State Management
  provider: ^6.1.2

  # UI / Utilities
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.4.0
  permission_handler: ^11.3.1
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

assets:
    - .env
